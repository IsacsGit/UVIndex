<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- iOS Web App Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UV Index">
  
  <title>UV Scan</title>
  <style>
    /* Premium Minimalist Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* 100dvh forces iOS stand-alone PWAs to stretch perfectly to hardware margins */
    html, body {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background-color: #0b0b0b;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(10px + env(safe-area-inset-top)) 24px calc(10px + env(safe-area-inset-bottom)) 24px;
    }

    header {
      text-align: center;
      margin-top: 5px;
    }

    header h1 {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8e8e93;
    }

    /* Screen States */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      flex: 1; /* Safari Flexbox compliance */
      min-height: 0;
    }

    .screen.active {
      display: flex;
    }

    #permission-screen, #loading-screen {
      justify-content: center;
    }

    #dashboard-screen {
      justify-content: space-between;
      padding-top: 10px;
      height: 100%;
    }

    /* Permission/Splash Screen */
    .permission-illustration {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #2c2c2e 0%, #1c1c1e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      border: 1px solid #3a3a3c;
    }

    .permission-text {
      text-align: center;
      max-width: 280px;
      margin-bottom: 32px;
    }

    .permission-text h2 {
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 12px;
    }

    .permission-text p {
      font-size: 0.95rem;
      color: #8e8e93;
      line-height: 1.5;
    }

    .btn {
      background-color: #ffffff;
      color: #000000;
      border: none;
      padding: 16px 32px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
      cursor: pointer;
      width: 100%;
      max-width: 240px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 0.9rem;
      color: #8e8e93;
      letter-spacing: 0.05em;
    }

    /* Dashboard Gauge (Tuned down slightly for multi-graph spacing) */
    .gauge-container {
      position: relative;
      width: 170px;
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gauge-svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .gauge-bg {
      fill: none;
      stroke: #1c1c1e;
      stroke-width: 5;
    }

    .gauge-fill {
      fill: none;
      stroke: #ffffff;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 628; 
      stroke-dashoffset: 628;
      transition: stroke-dashoffset 1s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .gauge-text {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .uv-value {
      font-size: 3.5rem;
      font-weight: 200;
      line-height: 1;
    }

    .uv-label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-top: 4px;
    }

    /* Premium Wavelength Timeline Chart Container (Compacted) */
    .timeline-container {
      width: 100%;
      max-width: 340px;
      background-color: #121214;
      border: 1px solid #1c1c1e;
      border-radius: 16px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .timeline-title {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8e8e93;
    }

    .timeline-chart-wrapper {
      position: relative;
      width: 100%;
      height: 60px; /* Highly optimized card heights */
    }

    .timeline-svg {
      width: 100%;
      height: 100%;
    }

    .timeline-labels {
      display: flex;
      justify-content: space-between;
      width: 100%;
      padding: 0 4px;
    }

    .timeline-label {
      font-size: 0.6rem;
      color: #8e8e93;
      text-align: center;
      width: calc(100% / 7);
    }

    .timeline-label.active {
      color: #ffffff;
      font-weight: 700;
    }

    /* Detail Cards Grid */
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }

    .card {
      background-color: #121214;
      border: 1px solid #1c1c1e;
      padding: 10px 12px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8e8e93;
      margin-bottom: 2px;
    }

    .card-value {
      font-size: 1.05rem;
      font-weight: 500;
    }

    .footer-actions {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .btn-secondary {
      background: none;
      border: none;
      color: #8e8e93;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>UV Exposure</h1>
    </header>

    <!-- 1. Location Access Request Screen -->
    <main id="permission-screen" class="screen active">
      <div class="permission-illustration">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="3"/>
        </svg>
      </div>
      <div class="permission-text">
        <h2>Local Sky Scan</h2>
        <p>This web app uses your current GPS coordinates to calculate the real-time ultraviolet index above you.</p>
      </div>
      <button class="btn" onclick="requestLocation()">Allow Scan</button>
    </main>

    <!-- 2. Loading State Screen -->
    <main id="loading-screen" class="screen">
      <div class="spinner"></div>
      <div class="loading-text">LOCATING COORDINATES</div>
    </main>

    <!-- 3. Primary Data Display Screen -->
    <main id="dashboard-screen" class="screen">
      
      <!-- Radial Gauge -->
      <div class="gauge-container">
        <svg class="gauge-svg" viewBox="0 0 220 220">
          <circle class="gauge-bg" cx="110" cy="110" r="100" />
          <circle id="progress-ring" class="gauge-fill" cx="110" cy="110" r="100" />
        </svg>
        <div class="gauge-text">
          <div id="uv-num" class="uv-value">0</div>
          <div id="uv-text" class="uv-label">Loading</div>
        </div>
      </div>

      <!-- UV Timeline Chart -->
      <div class="timeline-container">
        <span class="timeline-title">UV Index (7-Hour Forecast)</span>
        <div class="timeline-chart-wrapper">
          <svg class="timeline-svg" id="uv-sparkline" viewBox="0 0 300 60" preserveAspectRatio="none">
            <defs>
              <linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="timeline-labels" id="uv-timeline-labels"></div>
      </div>

      <!-- Temperature Timeline Chart -->
      <div class="timeline-container">
        <span class="timeline-title">Temperature (7-Hour Forecast)</span>
        <div class="timeline-chart-wrapper">
          <svg class="timeline-svg" id="temp-sparkline" viewBox="0 0 300 60" preserveAspectRatio="none"></svg>
        </div>
        <div class="timeline-labels" id="temp-timeline-labels"></div>
      </div>

      <!-- Contextual detail cards -->
      <div class="details-grid">
        <div class="card">
          <span class="card-title">Daily Peak</span>
          <span id="uv-peak" class="card-value">-</span>
        </div>
        <div class="card">
          <span class="card-title">Protection</span>
          <span id="uv-advice" class="card-value">-</span>
        </div>
      </div>

      <div class="footer-actions">
        <button class="btn-secondary" onclick="requestLocation()">Recalibrate</button>
      </div>
    </main>
  </div>

  <script>
    // System UI Controls
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.remove('active');
      });
      document.getElementById(screenId).classList.add('active');
    }

    // Initiate Geolocation Fetch
    function requestLocation() {
      showScreen('loading-screen');
      
      if (!navigator.geolocation) {
        alert("Geolocation is not supported by this device.");
        showScreen('permission-screen');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        onLocationSuccess,
        onLocationError,
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function onLocationError(error) {
      localStorage.removeItem('uv_location_allowed');
      alert("Unable to retrieve location. Please check your location settings in your device settings.");
      showScreen('permission-screen');
    }

    // Location successfully acquired
    async function onLocationSuccess(position) {
      localStorage.setItem('uv_location_allowed', 'true');
      
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      
      try {
        // Query API requesting both uv_index and temperature_2m
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=uv_index,temperature_2m&daily=uv_index_max&timezone=auto&past_days=1&forecast_days=2`);
        
        if (!response.ok) throw new Error("API response error");
        
        const data = await response.json();
        renderUVData(data);
      } catch (err) {
        alert("Failed to connect to local weather server. Try again shortly.");
        showScreen('permission-screen');
      }
    }

    // Format local time strictly into the API timezone hour string format: YYYY-MM-DDTHH:00
    function getFormattedLocalHour() {
      const d = new Date();
      const pad = n => n.toString().padStart(2, '0');
      const yyyy = d.getFullYear();
      const mm = pad(d.getMonth() + 1);
      const dd = pad(d.getDate());
      const hh = pad(d.getHours());
      return `${yyyy}-${mm}-${dd}T${hh}:00`;
    }

    // Process and display the weather data
    function renderUVData(data) {
      const hourlyTimes = data.hourly.time;
      const hourlyUV = data.hourly.uv_index;
      const hourlyTemp = data.hourly.temperature_2m;
      
      const dailyPeak = data.daily.uv_index_max[1]; 
      
      const currentFormattedTime = getFormattedLocalHour();
      const timeIndex = hourlyTimes.indexOf(currentFormattedTime);
      
      const currentUV = timeIndex !== -1 ? hourlyUV[timeIndex] : 0;

      document.getElementById('uv-num').innerText = currentUV.toFixed(1);
      document.getElementById('uv-peak').innerText = `${dailyPeak.toFixed(1)} Max`;
      
      let category = "Low";
      let advice = "No Shield";
      
      if (currentUV >= 3 && currentUV < 6) {
        category = "Moderate";
        advice = "SPF 15+";
      } else if (currentUV >= 6 && currentUV < 8) {
        category = "High";
        advice = "SPF 30+";
      } else if (currentUV >= 8 && currentUV < 11) {
        category = "Very High";
        advice = "Hat & SPF 50";
      } else if (currentUV >= 11) {
        category = "Extreme";
        advice = "Avoid Sun";
      }

      document.getElementById('uv-text').innerText = category;
      document.getElementById('uv-advice').innerText = advice;

      const progressRing = document.getElementById('progress-ring');
      const circumference = 628; 
      const maxScaleVal = 12;
      const scalePercent = Math.min(currentUV / maxScaleVal, 1);
      const offset = circumference - (scalePercent * circumference);
      
      progressRing.style.strokeDashoffset = offset;

      // Build Wavelength Timeline Sparklines dynamically
      renderSparkline('uv-sparkline', 'uv-timeline-labels', hourlyTimes, hourlyUV, timeIndex, false);
      renderSparkline('temp-sparkline', 'temp-timeline-labels', hourlyTimes, hourlyTemp, timeIndex, true);

      showScreen('dashboard-screen');
    }

    // Generic, highly responsive Sparkline renderer (Supports dynamic Y-scaling for Temp)
    function renderSparkline(svgId, labelContainerId, times, values, currentIndex, isTemp = false) {
      const sparkline = document.getElementById(svgId);
      const labelContainer = document.getElementById(labelContainerId);
      
      // Clear previous paths, circles and text
      sparkline.querySelectorAll('path, circle, text').forEach(el => el.remove());
      labelContainer.innerHTML = '';

      const chartWidth = 300;
      const chartHeight = 60;
      const padY = 16; // Ensures text labels above nodes never clip
      const usableHeight = chartHeight - padY * 2;

      const points = [];
      const labels = [];

      // Extract 7-hour subset (-3 hours to +3 hours)
      for (let i = -3; i <= 3; i++) {
        const targetIndex = currentIndex + i;
        if (targetIndex >= 0 && targetIndex < times.length) {
          const val = values[targetIndex];
          const timeStr = times[targetIndex];
          const hourFormatted = timeStr.split('T')[1].substring(0, 5); // Forces "HH:00" 24h format
          
          points.push({ val, active: i === 0 });
          labels.push({ text: hourFormatted, active: i === 0 });
        }
      }

      // Establish absolute dynamic scaling thresholds
      let minVal = 0;
      let maxVal = 12; // Static limit for UV scale
      
      if (isTemp) {
        const numericValues = points.map(p => p.val);
        // Dynamic padding wraps around temperature extremes (prevents flat horizontal lines)
        minVal = Math.min(...numericValues) - 1.5;
        maxVal = Math.max(...numericValues) + 1.5;
      }

      const range = maxVal - minVal || 1;

      // Map values to coordinates
      const coords = points.map((p, idx) => {
        const x = (idx / (points.length - 1)) * chartWidth;
        const y = chartHeight - padY - ((p.val - minVal) / range) * usableHeight;
        return { x, y, active: p.active, val: p.val };
      });

      // Build smooth Hermite Spline path
      let linePath = `M ${coords[0].x} ${coords[0].y} `;
      let areaPath = `M ${coords[0].x} ${chartHeight} L ${coords[0].x} ${coords[0].y} `;

      for (let i = 0; i < coords.length - 1; i++) {
        const p0 = coords[i];
        const p1 = coords[i + 1];
        
        const cpX1 = p0.x + (p1.x - p0.x) / 2;
        const cpY1 = p0.y;
        const cpX2 = p0.x + (p1.x - p0.x) / 2;
        const cpY2 = p1.y;

        const curveSegment = `C ${cpX1} ${cpY1}, ${cpX2} ${cpY2}, ${p1.x} ${p1.y} `;
        linePath += curveSegment;
        areaPath += curveSegment;
      }

      areaPath += `L ${chartWidth} ${chartHeight} Z`;

      // 1. Render gradient area fill
      const areaEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
      areaEl.setAttribute("d", areaPath);
      areaEl.setAttribute("fill", "url(#area-grad)");
      sparkline.appendChild(areaEl);

      // 2. Render stroke line
      const lineEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
      lineEl.setAttribute("d", linePath);
      lineEl.setAttribute("stroke", "rgba(255, 255, 255, 0.45)");
      lineEl.setAttribute("stroke-width", "1.5");
      lineEl.setAttribute("fill", "none");
      sparkline.appendChild(lineEl);

      // 3. Render raw numbers above each node
      coords.forEach((c, idx) => {
        const textVal = document.createElementNS("http://www.w3.org/2000/svg", "text");
        textVal.setAttribute("x", c.x);
        textVal.setAttribute("y", c.y - 10);
        textVal.setAttribute("fill", c.active ? "#ffffff" : "rgba(255, 255, 255, 0.4)");
        textVal.setAttribute("font-size", "8");
        textVal.setAttribute("font-weight", c.active ? "bold" : "normal");
        textVal.setAttribute("text-anchor", "middle");
        textVal.textContent = isTemp ? `${c.val.toFixed(0)}°` : c.val.toFixed(1);
        sparkline.appendChild(textVal);
      });

      // 4. Render glowing active node dot
      const activeNode = coords.find(c => c.active);
      if (activeNode) {
        const outerCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        outerCircle.setAttribute("cx", activeNode.x);
        outerCircle.setAttribute("cy", activeNode.y);
        outerCircle.setAttribute("r", "8");
        outerCircle.setAttribute("fill", "rgba(255, 255, 255, 0.2)");
        sparkline.appendChild(outerCircle);

        const innerCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        innerCircle.setAttribute("cx", activeNode.x);
        innerCircle.setAttribute("cy", activeNode.y);
        innerCircle.setAttribute("r", "3");
        innerCircle.setAttribute("fill", "#ffffff");
        sparkline.appendChild(innerCircle);
      }

      // Render bottom labels
      labels.forEach(l => {
        const span = document.createElement('span');
        span.className = `timeline-label ${l.active ? 'active' : ''}`;
        span.innerText = l.text;
        labelContainer.appendChild(span);
      });
    }

    // Check for previous authorization flags on startup
    window.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('uv_location_allowed') === 'true') {
        requestLocation();
      }
    });
  </script>
</body>
</html>
