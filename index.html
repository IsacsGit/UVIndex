<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Viewport optimized for iOS, preventing scaling and utilizing safe-area notch space -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- iOS Web App Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UV Index">
  
  <title>UV Scan</title>
  <style>
    /* Premium Minimalist Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body, html {
      width: 100%;
      height: 100%;
      background-color: #0b0b0b;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* Fixed position container resolves iOS standalone viewport height bugs */
    .app-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      /* Padding binds directly to hardware safe area limits */
      padding: calc(20px + env(safe-area-inset-top)) 24px calc(8px + env(safe-area-inset-bottom)) 24px;
    }

    header {
      text-align: center;
      margin-top: 10px;
    }

    header h1 {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8e8e93; /* Premium iOS gray */
    }

    /* Screen States */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .screen.active {
      display: flex;
    }

    /* Keep landing and loading screens clustered in center */
    #permission-screen, #loading-screen {
      justify-content: center;
    }

    /* Distribute dashboard elements cleanly to the absolute top and bottom */
    #dashboard-screen {
      justify-content: space-between;
      padding-top: 20px;
    }

    /* Permission/Splash Screen */
    .permission-illustration {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #2c2c2e 0%, #1c1c1e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      border: 1px solid #3a3a3c;
    }

    .permission-text {
      text-align: center;
      max-width: 280px;
      margin-bottom: 32px;
    }

    .permission-text h2 {
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .permission-text p {
      font-size: 0.95rem;
      color: #8e8e93;
      line-height: 1.5;
    }

    /* Premium Neutral Button */
    .btn {
      background-color: #ffffff;
      color: #000000;
      border: none;
      padding: 16px 32px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
      width: 100%;
      max-width: 240px;
      text-align: center;
    }

    .btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    /* Loading Screen */
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 0.9rem;
      color: #8e8e93;
      letter-spacing: 0.05em;
    }

    /* Dashboard/Display Screen (Scaled down slightly for compact devices) */
    .gauge-container {
      position: relative;
      width: 230px;
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* SVG Radial Progress Ring */
    .gauge-svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .gauge-bg {
      fill: none;
      stroke: #1c1c1e;
      stroke-width: 6;
    }

    .gauge-fill {
      fill: none;
      stroke: #ffffff;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 628; /* Circumference for r=100 */
      stroke-dashoffset: 628;
      transition: stroke-dashoffset 1s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .gauge-text {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .uv-value {
      font-size: 4.5rem;
      font-weight: 200;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .uv-label {
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-top: 8px;
    }

    /* Detail Cards Grid */
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 340px;
      margin-top: auto; /* Pushes cards cleanly down */
      margin-bottom: 16px;
    }

    .card {
      background-color: #1c1c1e;
      border: 1px solid #2c2c2e;
      padding: 16px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8e8e93;
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 1.2rem;
      font-weight: 500;
    }

    .footer-actions {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .btn-secondary {
      background: none;
      border: none;
      color: #8e8e93;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>UV Exposure</h1>
    </header>

    <!-- 1. Location Access Request Screen -->
    <main id="permission-screen" class="screen active">
      <div class="permission-illustration">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="3"/>
        </svg>
      </div>
      <div class="permission-text">
        <h2>Local Sky Scan</h2>
        <p>This web app uses your current GPS coordinates to calculate the real-time ultraviolet index above you.</p>
      </div>
      <button class="btn" onclick="requestLocation()">Allow Scan</button>
    </main>

    <!-- 2. Loading State Screen -->
    <main id="loading-screen" class="screen">
      <div class="spinner"></div>
      <div class="loading-text">LOCATING COORDINATES</div>
    </main>

    <!-- 3. Primary Data Display Screen -->
    <main id="dashboard-screen" class="screen">
      <div class="gauge-container">
        <svg class="gauge-svg" viewBox="0 0 220 220">
          <circle class="gauge-bg" cx="110" cy="110" r="100" />
          <circle id="progress-ring" class="gauge-fill" cx="110" cy="110" r="100" />
        </svg>
        <div class="gauge-text">
          <div id="uv-num" class="uv-value">0</div>
          <div id="uv-text" class="uv-label">Loading</div>
        </div>
      </div>

      <!-- Contextual detail cards -->
      <div class="details-grid">
        <div class="card">
          <span class="card-title">Daily Peak</span>
          <span id="uv-peak" class="card-value">-</span>
        </div>
        <div class="card">
          <span class="card-title">Protection</span>
          <span id="uv-advice" class="card-value">-</span>
        </div>
      </div>

      <div class="footer-actions">
        <button class="btn-secondary" onclick="requestLocation()">Recalibrate</button>
      </div>
    </main>
  </div>

  <script>
    // System UI Controls
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.remove('active');
      });
      document.getElementById(screenId).classList.add('active');
    }

    // Initiate Geolocation Fetch
    function requestLocation() {
      showScreen('loading-screen');
      
      if (!navigator.geolocation) {
        alert("Geolocation is not supported by this device.");
        showScreen('permission-screen');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        onLocationSuccess,
        onLocationError,
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function onLocationError(error) {
      // Clear persistence if scan fails so user can retry manually
      localStorage.removeItem('uv_location_allowed');
      alert("Unable to retrieve location. Please ensure Safari is authorized to access location in system settings.");
      showScreen('permission-screen');
    }

    // Location successfully acquired
    async function onLocationSuccess(position) {
      // Set the persistent authorization flag in localStorage
      localStorage.setItem('uv_location_allowed', 'true');
      
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      
      try {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=uv_index&daily=uv_index_max&timezone=auto&forecast_days=1`);
        
        if (!response.ok) throw new Error("API response error");
        
        const data = await response.json();
        renderUVData(data);
      } catch (err) {
        alert("Failed to connect to local weather server. Try again shortly.");
        showScreen('permission-screen');
      }
    }

    // Format local time strictly into the API timezone hour string format: YYYY-MM-DDTHH:00
    function getFormattedLocalHour() {
      const d = new Date();
      const pad = n => n.toString().padStart(2, '0');
      const yyyy = d.getFullYear();
      const mm = pad(d.getMonth() + 1);
      const dd = pad(d.getDate());
      const hh = pad(d.getHours());
      return `${yyyy}-${mm}-${dd}T${hh}:00`;
    }

    // Process and display the weather data
    function renderUVData(data) {
      const hourlyTimes = data.hourly.time;
      const hourlyUV = data.hourly.uv_index;
      const dailyPeak = data.daily.uv_index_max[0];
      
      const currentFormattedTime = getFormattedLocalHour();
      const timeIndex = hourlyTimes.indexOf(currentFormattedTime);
      
      const currentUV = timeIndex !== -1 ? hourlyUV[timeIndex] : hourlyUV[12];

      document.getElementById('uv-num').innerText = currentUV.toFixed(1);
      document.getElementById('uv-peak').innerText = `${dailyPeak.toFixed(1)} Max`;
      
      let category = "Low";
      let advice = "No Shield";
      
      if (currentUV >= 3 && currentUV < 6) {
        category = "Moderate";
        advice = "SPF 15+";
      } else if (currentUV >= 6 && currentUV < 8) {
        category = "High";
        advice = "SPF 30+";
      } else if (currentUV >= 8 && currentUV < 11) {
        category = "Very High";
        advice = "Hat & SPF 50";
      } else if (currentUV >= 11) {
        category = "Extreme";
        advice = "Avoid Sun";
      }

      document.getElementById('uv-text').innerText = category;
      document.getElementById('uv-advice').innerText = advice;

      const progressRing = document.getElementById('progress-ring');
      const circumference = 628; 
      
      const maxScaleVal = 12;
      const scalePercent = Math.min(currentUV / maxScaleVal, 1);
      const offset = circumference - (scalePercent * circumference);
      
      progressRing.style.strokeDashoffset = offset;

      showScreen('dashboard-screen');
    }

    // Check for previous authorization flags on startup
    window.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('uv_location_allowed') === 'true') {
        requestLocation();
      }
    });
  </script>
</body>
</html>
